  </g>
  <circle cx="348" cy="215" r="5" fill="#0E7490"/>
  <circle cx="612" cy="424" r="5" fill="#0E7490"/>
  <path d="M337 204C372 211 391 230 409 258" stroke="#0E7490" stroke-width="3" stroke-linecap="round"/>
  <path d="M604 430C639 441 658 455 676 484" stroke="#0E7490" stroke-width="3" stroke-linecap="round"/>
