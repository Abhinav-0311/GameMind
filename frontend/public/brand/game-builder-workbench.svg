    <circle cx="402" cy="294" r="18" fill="#0E7490"/>
    <path d="M394 294H410M402 286V302" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <rect x="430" y="286" width="118" height="14" rx="7" fill="#111827"/>
    <rect x="390" y="332" width="176" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="390" y="356" width="144" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="390" y="380" width="94" height="10" rx="5" fill="#CBD5E1"/>
    <text x="390" y="407" fill="#556274" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Game blueprint</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="628" y="426" width="236" height="184" rx="22" fill="#FFFFFF" stroke="#D8DEE6"/>
    <rect x="654" y="454" width="50" height="50" rx="14" fill="#ECFDF3" stroke="#A7F3D0"/>
    <rect x="722" y="454" width="50" height="50" rx="14" fill="#EFF6FF" stroke="#BFDBFE"/>
