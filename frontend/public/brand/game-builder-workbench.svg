<svg width="960" height="720" viewBox="0 0 960 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GameMind workbench flow</title>
  <desc id="desc">A quiet visual map showing a game document becoming a blueprint and then runtime game systems.</desc>
  <rect width="960" height="720" rx="36" fill="#FFFDF8"/>
  <rect x="44" y="44" width="872" height="632" rx="28" fill="#F7F3EB" stroke="#E4DACB"/>
  <path d="M96 573C180 524 249 541 325 503C402 465 426 386 504 363C581 339 643 383 721 348C792 316 827 248 870 210" stroke="#D8CDBB" stroke-width="2" stroke-linecap="round" stroke-dasharray="7 11"/>
  <g filter="url(#softShadow)">
